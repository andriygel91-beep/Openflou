      - name: 🔧 Optimized Patch & Shrink
        run: |
          # 1. Тайм-ауты и исправление Stripe (как у тебя было)
          echo "systemProp.org.gradle.internal.http.socketTimeout=60000" >> android/gradle.properties
          echo "systemProp.org.gradle.internal.http.connectionTimeout=60000" >> android/gradle.properties
          find . -name "build.gradle" -type f -exec sed -i 's/com.stripe:stripe-android:+/com.stripe:stripe-android:21.12.0/g' {} +

          # 2. Перезапись основного build.gradle
          cat <<EOF > android/build.gradle
          buildscript {
              ext {
                  buildToolsVersion = "35.0.0"
                  minSdkVersion = 24
                  compileSdkVersion = 35
                  targetSdkVersion = 35
                  ndkVersion = "27.0.12077973"
                  kotlinVersion = "2.0.0"
              }
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath('com.android.tools.build:gradle:8.8.2')
                  classpath('com.facebook.react:react-native-gradle-plugin')
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.0")
                  classpath("org.jetbrains.kotlin:compose-compiler-gradle-plugin:2.0.0")
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
              configurations.all {
                  resolutionStrategy {
                      force 'com.stripe:stripe-android:21.12.0'
                      force 'com.stripe:financial-connections:21.12.0'
                  }
              }
          }
          EOF

          # 3. МАГИЯ УМЕНЬШЕНИЯ РАЗМЕРА (Правка app/build.gradle)
          FILE_APP="android/app/build.gradle"
          
          # Оставляем только современную архитектуру (минус ~40-60МБ)
          sed -i '/defaultConfig {/a \        ndk { abiFilters "arm64-v8a" }' $FILE_APP
          
          # Включаем удаление мертвого кода и ресурсов (минус ~100МБ+)
          # Ищем блок release и вставляем туда настройки сжатия
          sed -i '/release {/a \            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"' $FILE_APP

          # Включаем Hermes (движок JS), если он вдруг выключен — это критично для размера
          sed -i 's/enableHermes: false/enableHermes: true/g' $FILE_APP || true

      - name: 🚀 Build Release APK
        env:
          NODE_ENV: production
          _JAVA_OPTIONS: "-Xmx4g"
        run: |
          cd android
          chmod +x gradlew
          # Обязательно clean, чтобы не потянуть старый мусор в сборку
          ./gradlew clean assembleRelease
          
