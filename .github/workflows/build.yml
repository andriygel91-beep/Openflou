name: Build Optimized APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile

      - name: 🏗 Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: 🔧 Patch and Shrink
        run: |
          FILE_APP="android/app/build.gradle"
          # 1. Принудительное сжатие и фильтр архитектур (только 64-бит)
          echo "android.defaultConfig.ndk.abiFilters 'arm64-v8a'" >> $FILE_APP
          echo "android.buildTypes.release.minifyEnabled = true" >> $FILE_APP
          echo "android.buildTypes.release.shrinkResources = true" >> $FILE_APP
          echo "android.buildTypes.release.proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'" >> $FILE_APP
          
          # 2. Включаем Hermes для оптимизации JS
          sed -i 's/enableHermes: false/enableHermes: true/g' $FILE_APP || true
          
          # 3. Фикс Stripe
          find . -name "build.gradle" -type f -exec sed -i 's/com.stripe:stripe-android:+/com.stripe:stripe-android:21.12.0/g' {} +

      - name: 🚀 Build Release APK
        env:
          NODE_ENV: production
          # Выделяем память для Java-процесса
          _JAVA_OPTIONS: "-Xmx8g -XX:MaxMetaspaceSize=1g"
        run: |
          cd android
          chmod +x gradlew
          # Запускаем сборку с выделением памяти для Gradle/R8, чтобы не было OutOfMemory
          ./gradlew clean assembleRelease -Dorg.gradle.jvmargs="-Xmx8g -XX:MaxMetaspaceSize=1g"

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Clean-Modern-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          
