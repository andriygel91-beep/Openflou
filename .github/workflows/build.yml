name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          # Используем флаг для "плоской" структуры модулей (решает проблему с Babel)
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile
          # Добавляем именно то, на что ругается лог
          pnpm add -D babel-preset-expo babel-plugin-module-resolver @react-native-community/cli

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NODE_ENV: production
        run: |
          # 1. Babel Config (фиксируем алиас @/ и пресет)
          cat <<'EOF' > babel.config.js
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
              plugins: [['module-resolver', { root: ['./'], alias: { '@': './' } }]],
            };
          };
          EOF

          # 2. Metro Config
          cat <<'EOF' > metro.config.js
          const { getDefaultConfig } = require('expo/metro-config');
          const config = getDefaultConfig(__dirname);
          module.exports = config;
          EOF

          # 3. Предсборка
          npx expo prebuild --platform android

          # 4. Сборка бандла (теперь Babel всё найдет)
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

          # 5. Финальная упаковка APK
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Success-V34
          path: android/app/build/outputs/apk/release/app-release.apk
          
