name: Build APK Release (38th Attempt - Force MavenCentral)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile

      - name: 🏗 Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: 🔧 Force Repositories and Fix Timeouts
        run: |
          # 1. Глобальные настройки таймаутов (5 минут ожидания)
          echo "systemProp.org.gradle.internal.http.socketTimeout=300000" >> android/gradle.properties
          echo "systemProp.org.gradle.internal.http.connectionTimeout=300000" >> android/gradle.properties
          
          # 2. Полная перезапись build.gradle с ПРАВИЛЬНЫМ порядком репозиториев
          # Мы ставим mavenCentral() ПЕРВЫМ, чтобы Stripe качался оттуда, а не с JitPack
          cat <<EOF > android/build.gradle
          allprojects {
              repositories {
                  mavenCentral()
                  google()
                  maven { url 'https://www.jitpack.io' }
              }
          }
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath('com.android.tools.build:gradle:8.8.2')
                  classpath('com.facebook.react:react-native-gradle-plugin')
              }
          }
          EOF

          # 3. Наши стандартные оптимизации для скорости и стабильности
          FILE_APP="android/app/build.gradle"
          sed -i '/defaultConfig {/a \        multiDexEnabled true' $FILE_APP
          sed -i '/release {/a \            ndk { abiFilters "arm64-v8a" }' $FILE_APP

      - name: 🚀 Build Release APK
        env:
          NODE_ENV: production
          _JAVA_OPTIONS: "-Xmx4g"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Build-38
          path: android/app/build/outputs/apk/release/app-release.apk
          
