name: Build Standard APK (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Restore Gradle Defaults
        run: |
          # Выключаем ProGuard и сжатие ресурсов, чтобы избежать багов
          sed -i 's/enableProguardInReleaseBuilds = true/enableProguardInReleaseBuilds = false/' android/app/build.gradle
          sed -i 's/enableShrinkResourcesInReleaseBuilds = true/enableShrinkResourcesInReleaseBuilds = false/' android/app/build.gradle

      - name: Build Release APK
        working-directory: android
        run: |
          # Увеличиваем память для стабильности, но без лишних флагов
          export _JAVA_OPTIONS="-Xmx4g"
          ./gradlew assembleRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Standard-APK
          path: android/app/build/outputs/apk/release/*.apk
          
