name: Build APK Release (Final Optimization)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile
          pnpm add -D babel-preset-expo

      - name: 🏗 Prebuild Android Directory
        run: |
          # Сначала генерируем папку android
          npx expo prebuild --platform android --no-install

      - name: 🔧 Optimize Android Project (MultiDex + ABI Filter)
        run: |
          # Теперь, когда папка android создана, правим файлы
          FILE="android/app/build.gradle"
          
          # 1. Включаем MultiDex (чтобы не падал DexMerging)
          sed -i '/defaultConfig {/a \        multiDexEnabled true' $FILE
          
          # 2. Ограничиваем сборку только архитектурой arm64-v8a для скорости
          # Ищем блок buildTypes { release { ... } } и вставляем туда фильтр
          sed -i '/release {/a \            ndk { abiFilters "arm64-v8a" }' $FILE

      - name: 🚀 Build Release APK
        env:
          NODE_ENV: production
          _JAVA_OPTIONS: "-Xmx4g"
        run: |
          # Создаем базовый конфиг метро
          echo "const { getDefaultConfig } = require('expo/metro-config'); module.exports = getDefaultConfig(__dirname);" > metro.config.js
          
          cd android
          chmod +x gradlew
          # Собираем финальный APK
          ./gradlew assembleRelease

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Success-Final
          path: android/app/build/outputs/apk/release/app-release.apk
          
