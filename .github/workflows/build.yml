name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Генерация нативных файлов Android
          npx expo prebuild --platform android --clean
          
          # 2. Создание папки для ассетов (защита от ошибок путей)
          mkdir -p android/app/src/main/assets
          
          # 3. Ручная сборка JS-бандла (Решает проблему белого экрана)
          # Используем входную точку Expo Router
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          
          # 4. Финальная компиляция APK
          cd android
          ./gradlew clean
          ./gradlew assembleRelease -x bundleReleaseJsAndAssets

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Messenger-Release
          path: android/app/build/outputs/apk/release/app-release.apk
          
