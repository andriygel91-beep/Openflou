name: Build APK Release (37th Attempt - Fixed Stripe & Timeouts)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile
          pnpm add -D babel-preset-expo

      - name: 🏗 Prebuild Android Directory
        run: |
          npx expo prebuild --platform android --no-install

      - name: 🔧 Fix Network & Gradle (Stripe Fix)
        run: |
          # 1. Увеличиваем таймауты загрузки, чтобы JitPack не вешал билд
          echo "systemProp.org.gradle.internal.http.socketTimeout=120000" >> android/gradle.properties
          echo "systemProp.org.gradle.internal.http.connectionTimeout=120000" >> android/gradle.properties
          
          # 2. Принудительно добавляем MavenCentral (там Stripe качается стабильнее)
          FILE_ROOT="android/build.gradle"
          sed -i 's/google()/google()\n        mavenCentral()/' $FILE_ROOT
          
          # 3. Наши прошлые оптимизации (MultiDex + ARM64)
          FILE_APP="android/app/build.gradle"
          sed -i '/defaultConfig {/a \        multiDexEnabled true' $FILE_APP
          sed -i '/release {/a \            ndk { abiFilters "arm64-v8a" }' $FILE_APP

      - name: 🚀 Build Release APK
        env:
          NODE_ENV: production
          _JAVA_OPTIONS: "-Xmx4g"
        run: |
          # Создаем конфиг метро
          echo "const { getDefaultConfig } = require('expo/metro-config'); module.exports = getDefaultConfig(__dirname);" > metro.config.js
          
          cd android
          chmod +x gradlew
          # Собираем только одну архитектуру для скорости
          ./gradlew assembleRelease

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Build-37
          path: android/app/build/outputs/apk/release/app-release.apk
