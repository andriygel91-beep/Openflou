name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. СОЗДАЕМ КОНФИГ ПЕРВЫМ ДЕЛОМ (лечит скрин #16:26)
          cat <<EOF > metro.config.js
          const { getDefaultConfig } = require('expo/metro-config');
          const path = require('path');
          const config = getDefaultConfig(__dirname);
          config.resolver.alias = {
            '@': path.resolve(__dirname),
          };
          module.exports = config;
          EOF

          # 2. Исправляем пути в файлах (подстраховка для Metro)
          find app -type f -name "*.tsx" -print0 | xargs -0 sed -i "s|@/hooks/|../hooks/|g" || true
          find app -type f -name "*.tsx" -print0 | xargs -0 sed -i "s|@/services/|../services/|g" || true

          # 3. Установка инструментов
          pnpm add -D @react-native-community/cli
          
          # 4. Предсборка (теперь конфиг на месте, Expo не ругнется)
          npx expo prebuild --platform android
          
          # 5. Сборка бандла
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

          # 6. Финальный APK
          cd android
          ./gradlew assembleRelease -x bundleReleaseJsAndAssets

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-V27-Final
          path: android/app/build/outputs/apk/release/app-release.apk
          
