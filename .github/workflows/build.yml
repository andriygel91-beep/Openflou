name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Создаем универсальный Babel Config (для поддержки @/ везде)
          cat <<'EOF' > babel.config.js
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
              plugins: [
                [
                  'module-resolver',
                  {
                    root: ['./'],
                    alias: { '@': './' },
                  },
                ],
              ],
            };
          };
          EOF

          # 2. Создаем Metro Config, который подхватит Babel
          cat <<'EOF' > metro.config.js
          const { getDefaultConfig } = require('expo/metro-config');
          const config = getDefaultConfig(__dirname);
          module.exports = config;
          EOF

          # 3. Устанавливаем плагин для резолвинга путей
          pnpm add -D babel-plugin-module-resolver @react-native-community/cli

          # 4. Предсборка
          npx expo prebuild --platform android --no-interactive
          
          # 5. Сборка бандла (теперь Babel сам поймет, что такое @/)
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

          # 6. Финальная компиляция APK
          cd android
          ./gradlew assembleRelease -x bundleReleaseJsAndAssets

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Universal-V29
          path: android/app/build/outputs/apk/release/app-release.apk
