name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          pnpm add -D @react-native-community/cli @babel/runtime babel-plugin-module-resolver

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Babel Config
          cat <<'EOF' > babel.config.js
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
              plugins: [['module-resolver', { root: ['./'], alias: { '@': './' } }]],
            };
          };
          EOF

          # 2. Metro Config
          cat <<'EOF' > metro.config.js
          const { getDefaultConfig } = require('expo/metro-config');
          const config = getDefaultConfig(__dirname);
          module.exports = config;
          EOF

          # 3. Предсборка (здесь подтянутся имя и иконка из app.json)
          npx expo prebuild --platform android

          # 4. Сборка бандла
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

          # 5. ФИНАЛЬНАЯ ИСПРАВЛЕННАЯ КОМАНДА (для RN 0.75+)
          cd android
          chmod +x gradlew
          # Мы убрали -x bundleReleaseJsAndAssets, так как команда теперь другая
          ./gradlew assembleRelease
          
      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Final-V33
          path: android/app/build/outputs/apk/release/app-release.apk
          
