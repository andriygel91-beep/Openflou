name: Build APK Release (Optimized)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile
          pnpm add -D babel-preset-expo

      - name: 🔧 Optimize Android Project
        run: |
          # Включаем MultiDex и фильтруем архитектуры, чтобы билд не падал и шел быстрее
          FILE="android/app/build.gradle"
          sed -i '/defaultConfig {/a \        multiDexEnabled true' $FILE
          sed -i '/abiFilters /d' $FILE # Удаляем старые фильтры если есть
          sed -i '/ndk {/a \            abiFilters "arm64-v8a"' $FILE

      - name: 🚀 Build Release APK
        env:
          NODE_ENV: production
          _JAVA_OPTIONS: "-Xmx4g" # Даем больше оперативы Java-машине
        run: |
          # Создаем пустой конфиг метро, если его нет
          echo "const { getDefaultConfig } = require('expo/metro-config'); module.exports = getDefaultConfig(__dirname);" > metro.config.js
          
          npx expo prebuild --platform android
          
          cd android
          chmod +x gradlew
          # Собираем только одну архитектуру (это ОЧЕНЬ ускорит процесс)
          ./gradlew assembleRelease -Pandroid.injected.abiCombo=arm64-v8a

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Arm64-Only
          path: android/app/build/outputs/apk/release/app-release.apk
          
