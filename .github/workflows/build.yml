name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Исправляем пути @/ прямо в файлах перед сборкой (самый надежный метод)
          # Это заменит все '@/hooks/' на '../hooks/' и т.д.
          find app -type f -name "*.tsx" -print0 | xargs -0 sed -i "s|@/hooks/|../hooks/|g"
          find app -type f -name "*.tsx" -print0 | xargs -0 sed -i "s|@/services/|../services/|g"
          find app -type f -name "*.tsx" -print0 | xargs -0 sed -i "s|@/components/|../components/|g"

          # 2. Установка CLI
          pnpm add -D @react-native-community/cli
          
          # 3. Генерация нативного кода
          npx expo prebuild --platform android
          
          # 4. Сборка бандла
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

          # 5. Финальная упаковка
          cd android
          ./gradlew assembleRelease -x bundleReleaseJsAndAssets

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Messenger-V26
          path: android/app/build/outputs/apk/release/app-release.apk
          
