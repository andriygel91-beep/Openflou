name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📦 Install Tools
        run: pnpm add -g eas-cli

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Force Build APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli project:init --non-interactive --force
          # Пытаемся создать ключи в автоматическом режиме через отдельную команду
          npx eas-cli build --platform android --profile preview --non-interactive --no-wait || true
          # Запуск сборки с игнорированием проверки ключей
          npx eas-cli build --platform android --profile preview --local --non-interactive --clear-cache
          
