name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📦 Install Tools
        run: pnpm add -g eas-cli expo-cli

      - name: 📦 Install Dependencies
        run: pnpm install

      - name: 🚀 Configure and Build APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Принудительная привязка проекта
          npx eas-cli project:init --non-interactive --force
          
          # 2. Создаем ключи (Keystore) в аккаунте Expo
          npx eas-cli build --platform android --profile preview --non-interactive --no-wait
          
          # 3. Запускаем локальную сборку APK
          npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: messenger-app-apk
          path: "*.apk"
          
