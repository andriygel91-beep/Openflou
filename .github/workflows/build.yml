name: Build APK Release (43rd Attempt - Strict Repo Isolation)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm config set shamefully-hoist true
          pnpm install --no-frozen-lockfile

      - name: 🏗 Prebuild Android Directory
        run: npx expo prebuild --platform android --no-install

      - name: 🔧 Fix Repositories and Force MavenCentral
        run: |
          # 1. Глобальные настройки таймаутов
          echo "systemProp.org.gradle.internal.http.socketTimeout=600000" >> android/gradle.properties
          echo "systemProp.org.gradle.internal.http.connectionTimeout=600000" >> android/gradle.properties
          
          # 2. Перезапись build.gradle с жесткой фильтрацией репозиториев
          # Мы явно говорим: Stripe брать из MavenCentral, а JitPack использовать только как запасной вариант
          cat <<EOF > android/build.gradle
          buildscript {
              ext {
                  buildToolsVersion = "35.0.0"
                  minSdkVersion = 24
                  compileSdkVersion = 35
                  targetSdkVersion = 35
                  ndkVersion = "27.0.12077973"
                  kotlinVersion = "2.0.0"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath('com.android.tools.build:gradle:8.8.2')
                  classpath('com.facebook.react:react-native-gradle-plugin')
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.0")
                  classpath("org.jetbrains.kotlin:compose-compiler-gradle-plugin:2.0.0")
              }
          }

          allprojects {
              repositories {
                  // ПРИОРИТЕТ 1: Официальные репозитории
                  google()
                  mavenCentral {
                      content {
                          includeGroup "com.stripe" // Принудительно ищем Stripe здесь
                      }
                  }
                  // ПРИОРИТЕТ 2: Все остальное
                  mavenCentral() 
                  maven { 
                      url 'https://www.jitpack.io' 
                      content {
                          excludeGroup "com.stripe" // ЗАПРЕЩАЕМ искать Stripe на JitPack
                      }
                  }
              }
          }
          EOF

          # 3. Оптимизация приложения
          FILE_APP="android/app/build.gradle"
          sed -i '/defaultConfig {/a \        multiDexEnabled true' $FILE_APP
          sed -i '/release {/a \            ndk { abiFilters "arm64-v8a" }' $FILE_APP

      - name: 🚀 Build Release APK
        env:
          NODE_ENV: production
          _JAVA_OPTIONS: "-Xmx4g"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Build-43
          path: android/app/build/outputs/apk/release/app-release.apk
          
