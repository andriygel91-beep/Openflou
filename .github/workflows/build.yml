name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📦 Install Tools
        run: pnpm add -g eas-cli

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Final Build Attempt
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli project:init --non-interactive --force
          # Пытаемся автоматически создать учетные данные для Android
          npx eas-cli build --platform android --profile preview --non-interactive --no-wait || true
          # Сама сборка
          npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: messenger-app-apk
          path: "*.apk"
          
