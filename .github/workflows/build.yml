name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. ЧИСТКА: Удаляем флаг --no-interactive из любых скрытых вызовов pnpm
          # и устанавливаем необходимые плагины для Babel
          pnpm add -D babel-plugin-module-resolver @react-native-community/cli

          # 2. УНИВЕРСАЛЬНЫЙ BABEL: Настраиваем алиас @/ на уровне ядра
          cat <<'EOF' > babel.config.js
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
              plugins: [
                [
                  'module-resolver',
                  {
                    root: ['./'],
                    alias: { '@': './' },
                    extensions: ['.js', '.jsx', '.ts', '.tsx', '.json']
                  },
                ],
              ],
            };
          };
          EOF

          # 3. METRO CONFIG: Гарантируем, что он видит Babel и расширения
          cat <<'EOF' > metro.config.js
          const { getDefaultConfig } = require('expo/metro-config');
          const config = getDefaultConfig(__dirname);
          config.resolver.sourceExts = [...config.resolver.sourceExts, 'ts', 'tsx', 'js', 'jsx', 'json'];
          module.exports = config;
          EOF

          # 4. ПОДГОТОВКА: Генерируем нативный код (БЕЗ флага --no-interactive)
          npx expo prebuild --platform android

          # 5. СБОРКА БАНДЛА: Прямое указание на входную точку и конфиг
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --config metro.config.js --reset-cache

          # 6. КОМПИЛЯЦИЯ APK: Финальный аккорд
          cd android
          ./gradlew assembleRelease -x bundleReleaseJsAndAssets

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-Messenger-Ultimate
          path: android/app/build/outputs/apk/release/app-release.apk
          
