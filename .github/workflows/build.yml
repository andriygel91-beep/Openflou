name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📦 Install EAS CLI
        run: pnpm add -g eas-cli

      - name: 📦 Install Dependencies
        run: pnpm install

      - name: 🚀 Build Local APK
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: 📂 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-app
          path: "*.apk"
          
