name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🏗 Setup Java (нужен для Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          pnpm add -g expo-cli eas-cli

      - name: 🚀 Prebuild and Local Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Генерируем папку android локально
          npx expo prebuild --platform android
          # 2. Собираем APK напрямую через Gradle, минуя Keystore от Expo
          cd android && ./gradlew assembleDebug

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: messenger-app-apk
          path: android/app/build/outputs/apk/debug/*.apk
          
