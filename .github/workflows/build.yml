name: Build APK Release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗 Install pnpm
        run: npm install -g pnpm

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile
          # Принудительно ставим CLI и хелперы, чтобы не было ошибки как на фото
          pnpm add -D @react-native-community/cli @babel/runtime babel-plugin-module-resolver

      - name: 🚀 Build Release APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Создаем Babel Config (лечит проблему с @/ и импортами)
          cat <<'EOF' > babel.config.js
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
              plugins: [
                ['module-resolver', {
                  root: ['./'],
                  alias: { '@': './' },
                  extensions: ['.js', '.jsx', '.ts', '.tsx', '.json']
                }]
              ],
            };
          };
          EOF

          # 2. Создаем Metro Config
          cat <<'EOF' > metro.config.js
          const { getDefaultConfig } = require('expo/metro-config');
          const config = getDefaultConfig(__dirname);
          module.exports = config;
          EOF

          # 3. Генерируем нативный код Android
          npx expo prebuild --platform android

          # 4. СОБИРАЕМ БАНДЛ (через npx, чтобы точно найти установленный CLI)
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

          # 5. КОМПИЛЯЦИЯ (Добавили chmod для прав доступа)
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -x bundleReleaseJsAndAssets

      - name: 📂 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: OpenFlou-V32-Final
          path: android/app/build/outputs/apk/release/app-release.apk
          
