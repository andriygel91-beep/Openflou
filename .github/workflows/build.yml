name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install EAS
        run: npm install -g eas-cli
      - name: Install Deps
        run: npm install
      - name: Build Local APK
        run: npx eas-cli build --platform android --profile preview --local --non-interactive
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "*.apk"
          
